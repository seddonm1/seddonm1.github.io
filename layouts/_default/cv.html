<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>{{ .Title }}</title>
  <link rel="canonical" href="{{ .Permalink }}">
  {{ partial "styles.html" . }}
</head>

<body>
  <section id=content>
    <div class="entry-content">
      {{ .Content }}
    </div>
  </section>
</body>

</html>
