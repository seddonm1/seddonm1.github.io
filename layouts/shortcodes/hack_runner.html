<div class="hack-runner" data-hack-runner>
  <div class="hack-runner-grid">
    <section class="hack-runner-panel">
      <div class="hack-runner-title">Assembly Input</div>
      <pre class="hack-runner-source" data-hack-source>// This file is part of www.nand2tetris.org
// and the book "The Elements of Computing Systems"
// by Nisan and Schocken, MIT Press.
// File name: projects/06/add/Add.asm

// Computes R0 = 2 + 3  (R0 refers to RAM[0])

@2
D=A
@3
D=D+A
@0
M=D</pre>
    </section>

    <section class="hack-runner-panel hack-runner-result-panel" data-hack-kind="neutral">
      <div class="hack-runner-title">Result</div>
      <pre class="hack-runner-result" data-hack-result></pre>
    </section>
  </div>
</div>
